name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ['3.10', '3.11', '3.12', '3.13']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
      - name: Install package (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev] || pip install -e .
      - name: Install test dependencies
        run: pip install pytest pytest-cov httpx pydantic llama-index-core
      - name: Run tests
        run: pytest tests/ -v --cov=llama_index.tools.enigmagent --cov-report=term-missing

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install build tooling
        run: |
          python -m pip install --upgrade pip
          pip install build
      - name: Build sdist + wheel
        run: python -m build
      - name: List dist artifacts
        run: ls -la dist/
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
